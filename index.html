<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kelim</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    #player {
      width: 80%;
      height: 400px;
      margin: 20px auto;
      display: block;
      background: #111;
    }
    #chatList {
      width: 80%;
      height: 200px;
      margin: 20px auto;
      background: #222;
      overflow-y: auto;
      padding: 10px;
      border-radius: 5px;
    }
    #chatInput {
      width: 70%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    #sendBtn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Bem-vindo ao Kelim</h1>
  <iframe id="player" allow="camera; microphone; fullscreen" autoplay></iframe>

  <div id="chatList"></div>
  <input id="chatInput" type="text" placeholder="Digite sua mensagem">
  <button id="sendBtn">Enviar</button>

  <script type="module">
    // Simples chat local (sem login)
    const chatList = document.getElementById("chatList");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");

    sendBtn.addEventListener("click", () => {
      const msg = chatInput.value.trim();
      if (msg) {
        const p = document.createElement("p");
        p.textContent = msg;
        chatList.appendChild(p);
        chatInput.value = "";
      }
    });
  </script>
</body>
</html>
