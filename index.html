<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#000,#0a0a0a,#0f2a1a);
  color:#fff;
}

#auth{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.logo{
  font-size:48px;
  font-weight:bold;
}

.google-btn{
  margin-top:30px;
  padding:14px 24px;
  border-radius:30px;
  border:none;
  background:white;
  cursor:pointer;
}

/* APP */
#app{display:none;padding:10px;}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
}

.btn{
  padding:10px;
  border-radius:20px;
  background:#ff2d55;
  border:none;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

input{margin-top:10px;}
</style>
</head>

<body>

<div id="auth">
  <div class="logo">KELIM</div>
  <button id="login" class="google-btn">Entrar com Google</button>
</div>

<div id="app">
  <h2 id="name"></h2>
  <img id="photo" class="avatar">

  <input type="file" id="upload">
  <button class="btn" id="savePhoto">Trocar Foto</button>

  <p>Seguidores: <span id="followers"></span></p>

  <button id="followBtn" class="btn">Seguir</button>

  <hr>

  <h3>Usuários</h3>
  <div id="usersList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_UID = "t2o0wJmLnbZ8VHWE1Th168F66xv2";

let currentUserData = null;
let viewingUserId = null;

/* LOGIN */
login.onclick = ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(user){

    authDiv.style.display="none";
    app.style.display="block";

    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    if(!snap.exists){
      await ref.set({
        name:user.displayName,
        photo:user.photoURL,
        followers: user.uid===ADMIN_UID ? 123000 : 0,
        verified: user.uid===ADMIN_UID
      });
    }

    currentUserData = (await ref.get()).data();

    loadProfile(user.uid);
    loadUsers();

  }else{
    authDiv.style.display="flex";
    app.style.display="none";
  }
});

/* CARREGAR PERFIL */
async function loadProfile(uid){
  viewingUserId = uid;

  const doc = await db.collection("users").doc(uid).get();
  const data = doc.data();

  name.innerText = data.name;
  photo.src = data.photo;
  followers.innerText = data.followers || 0;

  followBtn.style.display = uid===auth.currentUser.uid ? "none":"block";
}

/* LISTA DE USERS */
async function loadUsers(){
  const snap = await db.collection("users").get();
  usersList.innerHTML = "";

  snap.forEach(doc=>{
    const d = doc.data();

    const div = document.createElement("div");
    div.innerHTML = `
      <p>${d.name}</p>
      <button onclick="loadProfile('${doc.id}')">Ver perfil</button>
    `;
    usersList.appendChild(div);
  });
}

/* SEGUIR */
followBtn.onclick = async ()=>{
  const user = auth.currentUser;

  await db.collection("follows").add({
    from:user.uid,
    to:viewingUserId
  });

  await db.collection("users").doc(viewingUserId).update({
    followers: firebase.firestore.FieldValue.increment(1)
  });

  alert("Seguiu!");
};

/* TROCAR FOTO */
savePhoto.onclick = async ()=>{
  const file = upload.files[0];
  if(!file) return;

  const ref = storage.ref("profiles/"+auth.currentUser.uid);

  await ref.put(file);
  const url = await ref.getDownloadURL();

  await db.collection("users").doc(auth.currentUser.uid).update({
    photo:url
  });

  loadProfile(auth.currentUser.uid);
};
</script>

</body>
</html>
