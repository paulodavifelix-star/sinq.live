<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>senq.live</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:linear-gradient(to bottom,#000,#000,#022d1f);
  color:#fff;
  overflow:hidden;
}

/* LOGIN */
#auth{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(20px);
}

.logo{
  font-size:52px;
  font-weight:900;
  letter-spacing:4px;
}

.google-btn{
  margin-top:40px;
  padding:14px 26px;
  border-radius:999px;
  border:none;
  background:white;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
  transition:.2s;
}

.google-btn:hover{
  transform:scale(1.05);
}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.live{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

.info{
  position:relative;
  z-index:2;
}

.name{
  font-weight:800;
  font-size:18px;
}

.username{
  font-size:13px;
  color:#aaa;
}

.verified{
  color:#4da6ff;
  margin-left:6px;
}

.follow{
  margin-top:10px;
  padding:10px 20px;
  border-radius:999px;
  border:none;
  background:#ff2d55;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.follow.following{
  background:#444;
}

.follow:hover{
  transform:scale(1.1);
}

.side{
  position:absolute;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

.count{
  font-size:12px;
  text-align:center;
  color:#ccc;
}
</style>
</head>

<body>

<div id="auth">
  <div class="logo">senq.live</div>
  <button id="login" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Continuar com Google
  </button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "paulodavifelix-star.github.io",
  projectId: "kelim-f9e46"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_UID = "t2o0wJmLnbZ8VHWE1Th168F66xv2";

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* LOGIN */
document.getElementById("login").onclick = async ()=>{
  document.getElementById("login").innerText = "Entrando...";
  const provider = new firebase.auth.GoogleAuthProvider();
  await auth.signInWithRedirect(provider);
};

/* REDIRECT */
window.onload = async ()=>{
  try{
    await auth.getRedirectResult();
  }catch(e){
    console.error(e);
  }
};

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    if(!snap.exists){
      let baseName = user.displayName || user.email.split("@")[0];
      let username = baseName.replace(/\s+/g,"").toLowerCase();

      const check = await db.collection("users")
        .where("username","==",username)
        .get();

      if(!check.empty){
        username += Math.floor(Math.random()*9999);
      }

      await ref.set({
        name: baseName,
        username: username,
        verified: user.uid===ADMIN_UID
      });
    }

    loadFeed();
  }else{
    document.getElementById("auth").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

/* FEED */
async function loadFeed(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  const user = auth.currentUser;

  const usersSnap = await db.collection("users").get();

  for(const doc of usersSnap.docs){
    const d = doc.data();

    const followSnap = await db.collection("follows")
      .where("from","==",user.uid)
      .where("to","==",doc.id)
      .get();

    const followersSnap = await db.collection("follows")
      .where("to","==",doc.id)
      .get();

    const isFollowing = !followSnap.empty;

    const div = document.createElement("div");
    div.className="live";

    div.innerHTML = `
      <div class="overlay"></div>

      <div class="info">
        <div class="name">
          ${d.name}
          ${d.verified ? '<span class="verified">✔</span>' : ''}
        </div>
        <div class="username">@${d.username}</div>

        <button class="follow ${isFollowing ? 'following' : ''}" 
        onclick="toggleFollow('${doc.id}', this)">
          ${isFollowing ? 'Seguindo' : 'Seguir'}
        </button>
      </div>

      <div class="side">
        <div>
          <div class="circle">👥</div>
          <div class="count">${followersSnap.size}</div>
        </div>

        <div class="circle">❤️</div>
        <div class="circle">💬</div>
        <div class="circle">↗</div>
      </div>
    `;

    app.appendChild(div);
  }
}

/* FOLLOW */
async function toggleFollow(uid, btn){
  const user = auth.currentUser;

  const snap = await db.collection("follows")
    .where("from","==",user.uid)
    .where("to","==",uid)
    .get();

  if(!snap.empty){
    snap.forEach(doc=> doc.ref.delete());
    btn.innerText="Seguir";
    btn.classList.remove("following");
  }else{
    await db.collection("follows").add({
      from:user.uid,
      to:uid
    });
    btn.innerText="Seguindo";
    btn.classList.add("following");
  }

  loadFeed();
}
</script>

</body>
</html>
