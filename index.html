<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to top, rgba(34,197,94,0.2), #000);
  color:white;
}

.hidden{display:none;}

.center{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  flex-direction:column;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}

.chat{
  height:200px;
  overflow:auto;
  border:1px solid #333;
  margin:10px 0;
  padding:10px;
}

img{
  border-radius:50%;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="center">
  <h1>kelim</h1>
  <button id="loginBtn">Entrar com Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2 id="userName"></h2>

  <!-- FOTO -->
  <input type="file" id="photoInput">
  <img id="photo" width="80">

  <!-- FOLLOW -->
  <button id="followBtn">Seguir</button>
  <p id="followersCount">0 seguidores</p>

  <!-- LIVE -->
  <button id="startLive">Iniciar Live</button>
  <button id="enterLive">Entrar Live</button>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>
  <input id="msg">
  <button id="send">Enviar</button>

  <br><br>
  <button onclick="logout()">Sair</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.appspot.com",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user;

// LOGIN
document.getElementById("loginBtn").onclick = async ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  try{
    await auth.signInWithPopup(provider);
  }catch(e){
    alert("Erro no login");
    console.log(e);
  }
};

// LOGOUT
function logout(){
  auth.signOut();
}

// 🔥 CORREÇÃO PRINCIPAL (AQUI ESTAVA O ERRO)
auth.onAuthStateChanged(async u=>{
  const authDiv = document.getElementById("auth");
  const appDiv = document.getElementById("app");

  if(u){
    user = u;

    authDiv.classList.add("hidden");
    appDiv.classList.remove("hidden");

    document.getElementById("userName").innerText = "Olá, " + u.displayName;

    loadProfile();
    loadFollowers();
    loadChat();

  }else{
    authDiv.classList.remove("hidden");
    appDiv.classList.add("hidden");
  }
});

// ================= PROFILE =================
async function loadProfile(){
  const ref = db.collection("users").doc(user.uid);
  const doc = await ref.get();

  if(doc.exists){
    document.getElementById("photo").src = doc.data().photo || "";
  }
}

// UPLOAD FOTO
document.getElementById("photoInput").onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  const ref = storage.ref("photos/"+user.uid);

  await ref.put(file);
  const url = await ref.getDownloadURL();

  await db.collection("users").doc(user.uid).set({
    photo: url
  }, {merge:true});

  document.getElementById("photo").src = url;
};

// ================= FOLLOW =================
function loadFollowers(){
  db.collection("followers").doc(user.uid)
  .onSnapshot(doc=>{
    document.getElementById("followersCount").innerText =
      (doc.data()?.count || 0) + " seguidores";
  });
}

document.getElementById("followBtn").onclick = async ()=>{
  const ref = db.collection("followers").doc(user.uid);

  await ref.set({
    count: firebase.firestore.FieldValue.increment(1)
  }, {merge:true});
};

// ================= LIVE =================
document.getElementById("startLive").onclick = async ()=>{
  await db.collection("live").doc("main").set({
    active:true,
    owner:user.displayName,
    viewers:1
  });
};

document.getElementById("enterLive").onclick = async ()=>{
  await db.collection("live").doc("main").update({
    viewers: firebase.firestore.FieldValue.increment(1)
  });
};

// ================= CHAT =================
function loadChat(){
  db.collection("chat")
  .orderBy("time")
  .onSnapshot(snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(doc=>{
      const d = doc.data();
      chat.innerHTML += `<p><b>${d.name}:</b> ${d.msg}</p>`;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}

document.getElementById("send").onclick = ()=>{
  const msgInput = document.getElementById("msg");
  if(!msgInput.value) return;

  db.collection("chat").add({
    name:user.displayName,
    msg:msgInput.value,
    time:Date.now()
  });

  msgInput.value="";
};

</script>

</body>
</html>
