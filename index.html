<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.firebasestorage.app",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ELEMENTOS
const loginBtn = document.getElementById("googleLoginBtn");
const appDiv = document.getElementById("app");
const authScreen = document.getElementById("authScreen");

// LOGIN
loginBtn.onclick = async () => {
  await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authScreen.classList.add("hidden");
    appDiv.classList.remove("hidden");

    await carregarPerfil(user);
  } else {
    authScreen.classList.remove("hidden");
    appDiv.classList.add("hidden");
  }
});

// PERFIL
async function carregarPerfil(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      nome: user.displayName || "Usuário",
      bio: "",
      foto: user.photoURL || "",
      seguidores: 0,
      seguindo: 0
    });
  }

  onSnapshot(ref, (docSnap) => {
    const data = docSnap.data();

    document.getElementById("profileName").textContent = data.nome;
    document.getElementById("profileBio").textContent = data.bio || "Sem bio";

    const fotoDiv = document.getElementById("profilePhoto");
    if (data.foto) {
      fotoDiv.innerHTML = `<img src="${data.foto}" style="width:100%;height:100%;border-radius:20px;">`;
    }

    // seguidores e seguindo (NOVO)
    document.getElementById("profileLinks").innerHTML = `
      <div>👥 Seguidores: ${data.seguidores}</div>
      <div>➡️ Seguindo: ${data.seguindo}</div>
    `;
  });
}

// SALVAR PERFIL
document.getElementById("saveProfileBtn").onclick = async () => {
  const user = auth.currentUser;
  if (!user) return;

  const ref = doc(db, "users", user.uid);

  await setDoc(ref, {
    nome: document.getElementById("editDisplayName").value,
    bio: document.getElementById("editBio").value,
    foto: document.getElementById("editPhotoUrl").value
  }, { merge: true });
};

// CHAT
document.getElementById("sendBtn").onclick = async () => {
  const user = auth.currentUser;
  const text = document.getElementById("chatInput").value;

  if (!text) return;

  await addDoc(collection(db, "chat"), {
    user: user.displayName,
    text,
    createdAt: serverTimestamp()
  });

  document.getElementById("chatInput").value = "";
};

// LISTENER CHAT
onSnapshot(collection(db, "chat"), (snapshot) => {
  const chat = document.getElementById("chatList");
  chat.innerHTML = "";

  snapshot.forEach(doc => {
    const msg = doc.data();
    chat.innerHTML += `<p><b>${msg.user}:</b> ${msg.text}</p>`;
  });
});

// LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};
</script>
