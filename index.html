<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Plataforma</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

header {
  padding:15px;
  font-size:20px;
  text-align:center;
}

.container {
  display:flex;
  flex-direction:column;
  height:100vh;
}

.video-area {
  position:relative;
}

iframe {
  width:100%;
  height:300px;
  border:none;
}

.overlay {
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:14px;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
}

.messages {
  flex:1;
  overflow-y:auto;
  font-size:14px;
}

.input-area {
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#9146ff;
  color:white;
}
</style>
</head>

<body>

<header>🔥 Live Agora</header>

<div class="container">

<div class="video-area">
  <iframe id="player"></iframe>
  <div class="overlay">
    👀 <span id="viewers">12</span> assistindo
  </div>
</div>

<div style="text-align:center; margin:10px;">
  <button onclick="startLive()">🎥 Entrar ao Vivo</button>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="Comentar...">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

</div>

<script>
const room = "live123";

function startLive() {
  window.open("https://vdo.ninja/?push=" + room, "_blank");
  document.getElementById("player").src = "https://vdo.ninja/?view=" + room;
}

// CHAT LOCAL
function sendMessage() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  addMessage("Você", input.value);
  input.value = "";
}

function addMessage(user, text) {
  const msgBox = document.getElementById("messages");
  const el = document.createElement("div");
  el.innerHTML = `<b>${user}:</b> ${text}`;
  msgBox.appendChild(el);
  msgBox.scrollTop = msgBox.scrollHeight;
}

// BOTS INTELIGENTES
const botNames = ["joao123", "ana_live", "user999", "carlosx", "mariazinha"];
const botMessages = [
  "kkkkk",
  "olha isso",
  "mano que top",
  "faz isso de novo",
  "não acredito nisso",
  "muito bom",
  "que isso vei",
  "tá travando?",
  "melhor live"
];

function randomBotMessage() {
  const name = botNames[Math.floor(Math.random()*botNames.length)];
  const msg = botMessages[Math.floor(Math.random()*botMessages.length)];

  addMessage(name, msg);
}

// DISPARO AUTOMÁTICO DOS BOTS
setInterval(() => {
  if (Math.random() > 0.3) {
    randomBotMessage();
  }
}, 2000);

// VIEWERS DINÂMICOS
let viewers = 12;

setInterval(() => {
  const change = Math.floor(Math.random()*5);
  viewers += Math.random() > 0.5 ? change : -change;

  if (viewers < 5) viewers = 5;

  document.getElementById("viewers").innerText = viewers;
}, 3000);

</script>

</body>
</html>
