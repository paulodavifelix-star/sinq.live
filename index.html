<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>kelim</title>
</head>

<body>

<!-- SUA TELA ORIGINAL -->
<section id="authScreen">
  <button id="googleLoginBtn">Entrar com Google</button>
</section>

<div id="app" style="display:none;">
  <h1>Você entrou 🎉</h1>
  <p id="userName"></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script>
// 🔥 SUA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.firebasestorage.app",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// =========================
// 🔥 LOGIN CORRIGIDO (POPUP)
// =========================
async function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  try {
    const result = await auth.signInWithPopup(provider);

    const user = result.user;

    console.log("✅ Logado:", user);

    entrarNoApp(user);

  } catch (error) {
    console.error(error);
    alert("Erro no login");
  }
}

// =========================
// 🔥 MOSTRAR APP
// =========================
function entrarNoApp(user) {
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userName").innerText = user.displayName;
}

// =========================
// 🔥 ESTADO AUTOMÁTICO
// =========================
auth.onAuthStateChanged((user) => {
  if (user) {
    entrarNoApp(user);
  }
});

// BOTÃO
document.getElementById("googleLoginBtn").onclick = loginWithGoogle;

</script>

</body>
</html>
