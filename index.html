<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>senq.live</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:linear-gradient(to bottom,#000,#000,#022d1f);
  color:#fff;
  overflow:hidden;
}

/* LOGIN */
#auth{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(20px);
}

.logo{
  font-size:52px;
  font-weight:900;
  letter-spacing:4px;
}

.google-btn{
  margin-top:40px;
  padding:14px 26px;
  border-radius:999px;
  border:none;
  background:white;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.live{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

.info{
  position:relative;
  z-index:2;
}

.name{
  font-weight:800;
}

.username{
  font-size:13px;
  color:#aaa;
}

.verified{
  color:#4da6ff;
  margin-left:6px;
}

.follow{
  margin-top:10px;
  padding:10px 20px;
  border-radius:999px;
  border:none;
  background:#ff2d55;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.follow:hover{
  transform:scale(1.1);
}

.side{
  position:absolute;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="auth">
  <div class="logo">senq.live</div>
  <button id="login" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Continuar com Google
  </button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
