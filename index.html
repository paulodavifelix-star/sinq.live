<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senq.Live</title>
<style>
  /* Tela inicial perfeita como você pediu */
  body, html { margin:0; padding:0; font-family: 'Arial', sans-serif; height:100%; overflow:hidden; }
  #auth {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: url('fundo-blur.jpg') no-repeat center center fixed;
    background-size: cover;
    height:100%;
    color:white;
    text-align:center;
  }
  #auth h1 {
    font-size: 3em; letter-spacing: 2px; margin-bottom: 30px;
    /* Letras com riscos dentro tipo 7 e $ */
    background: linear-gradient(45deg, #fff 25%, #000 25%, #000 50%, #fff 50%, #fff 75%, #000 75%, #000);
    -webkit-background-clip: text; color: transparent;
  }
  #login-google {
    display:flex; align-items:center; justify-content:center;
    background:white; color:#444; font-weight:bold;
    padding:10px 20px; border-radius:30px;
    cursor:pointer; transition:0.3s;
  }
  #login-google:hover { background:#eee; transform: scale(1.05); }

  /* Tela do app */
  #app { display:none; height:100%; background:#111; color:white; padding:20px; overflow-y:auto; }
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="auth">
  <h1>Senq.Live</h1>
  <div id="login-google">Continuar com Google</div>
</div>

<!-- TELA DO APP -->
<div id="app">
  <h2>Bem-vindo(a) <span id="username"></span>!</h2>
  <p>UID: <span id="uid"></span></p>
  <p>Seu perfil está logado.</p>
  <button id="logout">Sair</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>

<script>
  // Config Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
    authDomain: "kelim-f9e46.firebaseapp.com",
    projectId: "kelim-f9e46",
    storageBucket: "kelim-f9e46.appspot.com",
    messagingSenderId: "912757042147",
    appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6",
    measurementId: "G-QE3JHTLS32"
  };

  // Inicializa Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Seu UID de admin
  const ADMIN_UID = "t2o0wJmLnbZ8VHWE1Th168F66xv2";

  // Login com Google
  const provider = new firebase.auth.GoogleAuthProvider();
  document.getElementById("login-google").addEventListener("click", () => {
    auth.signInWithPopup(provider)
      .then(result => {
        const user = result.user;

        // Verifica se username já existe
        const username = user.displayName.replace(/\s/g,"");
        db.collection("users").where("username","==",username).get()
          .then(query => {
            if (!query.empty) {
              alert("Nome de usuário já existe, será adicionado um número.");
            }
            const finalUsername = query.empty ? username : username + Math.floor(Math.random()*999);
            const userRef = db.collection("users").doc(user.uid);
            userRef.set({
              username: finalUsername,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              verified: user.uid === ADMIN_UID
            }, {merge:true});
          });

        // Mostra app
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("username").innerText = user.displayName;
        document.getElementById("uid").innerText = user.uid;
      })
      .catch(err => { console.error(err); alert("Erro ao logar com Google"); });
  });

  // Mantém login ativo
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("username").innerText = user.displayName;
      document.getElementById("uid").innerText = user.uid;
    } else {
      document.getElementById("auth").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }
  });

  // Logout
  document.getElementById("logout").addEventListener("click", () => {
    auth.signOut();
  });
</script>

</body>
</html>
