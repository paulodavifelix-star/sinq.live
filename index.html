<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#000,#002200);
  color:#fff;
}

/* LOGIN BONITO */
#auth{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  backdrop-filter: blur(30px);
}

.logo{
  font-size:70px;
  font-weight:900;
  letter-spacing:5px;
}

.google-btn{
  margin-top:40px;
  background:#fff;
  color:#000;
  padding:15px 30px;
  border-radius:40px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 30px rgba(255,255,255,0.3);
  transition:0.2s;
}
.google-btn:hover{
  transform:scale(1.05);
}

/* APP */
#app{display:none;}

.live{
  height:100vh;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

/* CHAT */
.chat{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  padding:10px;
}

#messages{
  max-height:150px;
  overflow:auto;
  font-size:14px;
}

input{
  width:70%;
  padding:10px;
  border-radius:20px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff2d55;
  color:#fff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="logo">KELIM</div>

  <div class="google-btn" id="loginBtn">
    <img src="https://developers.google.com/identity/images/g-logo.png" width="20">
    Continuar com Google
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="live">
    <iframe id="player"></iframe>
  </div>

  <div class="chat">
    <div id="messages"></div>
    <input id="msg" placeholder="comentário">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>

// CONFIG (SEU FIREBASE)
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.appspot.com",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_UID = "t2o0wJmLnbZ8VHWE1Th168F66xv2";

let user;

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  await auth.signInWithPopup(provider);
};

// CORREÇÃO DO BUG (ESSENCIAL)
auth.onAuthStateChanged(async (u) => {

  if (!u) return;

  user = u;

  // MOSTRA APP
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  await createUser();

  startLive();
  listenChat();

  // ADMIN (AGORA FUNCIONA)
  if(user.uid === ADMIN_UID){
    setInterval(()=>{
      db.collection("chat").add({
        name:"BOT",
        text:"🔥 essa live tá top",
        time:Date.now()
      });
    },3000);
  }

});

// CRIA USUÁRIO AUTOMÁTICO
async function createUser(){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      name:user.displayName,
      createdAt:Date.now()
    });
  }
}

// LIVE
function startLive(){
  document.getElementById("player").src = "https://vdo.ninja/?view=kelim";
}

// CHAT REALTIME
function listenChat(){
  db.collection("chat")
  .orderBy("time")
  .onSnapshot(snap=>{
    const box = document.getElementById("messages");
    box.innerHTML="";
    snap.forEach(doc=>{
      const d = doc.data();
      box.innerHTML += `<p><b>${d.name}:</b> ${d.text}</p>`;
    });
  });
}

// ENVIAR MSG
function send(){
  const text = document.getElementById("msg").value;

  if(!text) return;

  db.collection("chat").add({
    name:user.displayName,
    text,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

</script>

</body>
</html>
