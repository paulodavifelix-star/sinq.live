<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(to top, rgba(34,197,94,0.25), #000);
}

/* BLUR FUNDO */
.bg{
  position:absolute;
  inset:0;
  backdrop-filter: blur(50px);
}

/* CONTAINER */
.center{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo{
  font-size:64px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:40px;
  text-shadow: 0 0 8px rgba(255,255,255,0.1);
}

.logo .k{
  font-size:78px;
}

/* BOTÃO GOOGLE PADRÃO */
.google-btn{
  background:white;
  color:#111;
  border:none;
  border-radius:14px;
  padding:14px 22px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:0.2s;
}

.google-btn:hover{
  transform:scale(1.05);
}

/* ÍCONE GOOGLE */
.google-icon{
  width:20px;
  height:20px;
}

/* APP */
#app{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="auth" class="center">

  <div class="logo">
    <span class="k">k</span>elim
  </div>

  <button id="loginBtn" class="google-btn">
    <img class="google-icon" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Entrar com Google
  </button>

</div>

<!-- APP -->
<div id="app">
  <h2 id="userName"></h2>
  <button onclick="logout()">Sair</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.appspot.com",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// LOGIN (REDIRECT = CORRIGIDO)
document.getElementById("loginBtn").onclick = ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
};

// RETORNO DO LOGIN
auth.getRedirectResult().then((result)=>{
  if(result.user){
    console.log("Logado:", result.user.displayName);
  }
}).catch(console.error);

// ESTADO DO USUÁRIO
auth.onAuthStateChanged(user=>{
  const authDiv = document.getElementById("auth");
  const appDiv = document.getElementById("app");

  if(user){
    authDiv.style.display = "none";
    appDiv.style.display = "block";

    document.getElementById("userName").innerText =
      "Bem-vindo, " + user.displayName;

  }else{
    authDiv.style.display = "flex";
    appDiv.style.display = "none";
  }
});

// LOGOUT
function logout(){
  auth.signOut();
}

</script>

</body>
</html>
