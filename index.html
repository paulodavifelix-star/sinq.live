<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin:0;
  background:#000;
  font-family: Arial;
  overflow:hidden;
}

/* VIDEO FULL */
.video-area {
  position:relative;
  width:100%;
  height:100vh;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* TOP BAR */
.top-bar {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live-badge {
  background:red;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.viewers {
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

/* CHAT OVERLAY */
.chat-box {
  position:absolute;
  bottom:60px;
  left:10px;
  width:70%;
  max-height:200px;
  overflow:hidden;
  font-size:13px;
}

.message {
  margin:3px 0;
  opacity:0.9;
}

/* INPUT */
.input-area {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button {
  margin-left:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ff2d55;
  color:white;
}

/* START BUTTON */
.start-btn {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:15px 25px;
  background:#ff2d55;
  border:none;
  border-radius:20px;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="video-area">

  <iframe id="player"></iframe>

  <div class="top-bar">
    <div class="live-badge">LIVE</div>
    <div class="viewers"><span id="viewers">15</span> assistindo</div>
  </div>

  <div class="chat-box" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="Comentar...">
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <button class="start-btn" onclick="startLive()">Entrar ao Vivo</button>

</div>

<script>
const room = "live123";

function startLive() {
  window.open("https://vdo.ninja/?push=" + room, "_blank");
  document.getElementById("player").src = "https://vdo.ninja/?view=" + room;
}

// CHAT
function sendMessage() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  addMessage("Você", input.value);
  input.value = "";
}

function addMessage(user, text) {
  const msgBox = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = "message";
  el.innerHTML = `<b>${user}:</b> ${text}`;
  msgBox.appendChild(el);

  if (msgBox.children.length > 20) {
    msgBox.removeChild(msgBox.firstChild);
  }
}

// BOTS
const botNames = ["joao", "ana", "carlos", "maria", "user_x"];
const botMessages = [
  "muito bom",
  "kkkk",
  "faz de novo",
  "isso foi louco",
  "top demais",
  "não acredito",
  "tá travando?"
];

setInterval(() => {
  if (Math.random() > 0.4) {
    const name = botNames[Math.floor(Math.random()*botNames.length)];
    const msg = botMessages[Math.floor(Math.random()*botMessages.length)];
    addMessage(name, msg);
  }
}, 1500);

// VIEWERS
let viewers = 15;

setInterval(() => {
  let change = Math.floor(Math.random()*6);
  viewers += Math.random() > 0.5 ? change : -change;

  if (viewers < 5) viewers = 5;

  document.getElementById("viewers").innerText = viewers;
}, 2500);

</script>

</body>
</html>
