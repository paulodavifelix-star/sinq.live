<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>senq.live</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:linear-gradient(to bottom,#000,#000,#022d1f);
  color:#fff;
  overflow:hidden;
}

/* LOGIN */
#auth{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(20px);
}

.logo{
  font-size:52px;
  font-weight:900;
  letter-spacing:4px;
}

.google-btn{
  margin-top:40px;
  padding:14px 26px;
  border-radius:999px;
  border:none;
  background:white;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* APP */
#app{
  display:none;
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* LIVE CARD */
.live{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

.info{
  position:relative;
  z-index:2;
}

.name{
  font-weight:800;
}

.verified{
  color:#4da6ff;
  margin-left:6px;
}

.follow{
  margin-top:10px;
  padding:10px 20px;
  border-radius:999px;
  border:none;
  background:#ff2d55;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.follow:hover{
  transform:scale(1.1);
}

/* SIDE BUTTONS */
.side{
  position:absolute;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="logo">senq.live</div>
  <button id="login" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Continuar com Google
  </button>
</div>

<!-- APP -->
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_UID = "t2o0wJmLnbZ8VHWE1Th168F66xv2";

/* LOGIN */
login.onclick = ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(user){

    auth.style.display="none";
    app.style.display="block";

    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    if(!snap.exists){
      await ref.set({
        name:user.displayName,
        verified: user.uid===ADMIN_UID
      });
    }

    loadFeed();

  }else{
    auth.style.display="flex";
    app.style.display="none";
  }
});

/* FEED */
async function loadFeed(){
  const appDiv = document.getElementById("app");
  appDiv.innerHTML = "";

  const users = await db.collection("users").get();

  users.forEach(doc=>{
    const d = doc.data();

    const div = document.createElement("div");
    div.className="live";

    div.innerHTML = `
      <div class="overlay"></div>

      <div class="info">
        <div class="name">
          ${d.name}
          ${d.verified ? '<span class="verified">✔</span>' : ''}
        </div>

        <button class="follow" onclick="seguir('${doc.id}')">
          Seguir
        </button>
      </div>

      <div class="side">
        <div class="circle">❤️</div>
        <div class="circle">💬</div>
        <div class="circle">↗</div>
      </div>
    `;

    appDiv.appendChild(div);
  });
}

/* SEGUIR */
async function seguir(uid){
  const user = auth.currentUser;

  await db.collection("follows").add({
    from:user.uid,
    to:uid
  });

  alert("Seguindo!");
}
</script>

</body>
</html>
