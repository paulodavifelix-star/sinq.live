<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
:root{
  --bg: #000;
  --green: rgba(34,197,94,0.25);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: linear-gradient(to top, var(--green), #000);
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  overflow:hidden;
}

/* FUNDO DESFOCADO */
.bg-blur{
  position:absolute;
  inset:0;
  backdrop-filter: blur(40px);
  z-index:0;
}

/* CONTEÚDO */
.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo{
  font-size:60px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:40px;
}

.logo span{
  display:inline-block;
}

/* K MAIOR */
.logo .k{
  font-size:72px;
}

/* efeito "riscos" */
.logo{
  text-shadow:
    0 0 2px rgba(255,255,255,0.2),
    0 0 4px rgba(255,255,255,0.15);
}

/* BOTÃO GOOGLE */
.google-btn{
  background:white;
  color:black;
  border:none;
  padding:14px 24px;
  border-radius:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:0.2s;
}

.google-btn:hover{
  transform:scale(1.05);
}

/* bolinha google */
.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  background: linear-gradient(135deg,#ea4335,#fbbc05,#34a853,#4285f4);
}

/* APP (depois do login) */
#app{
  display:none;
  padding:20px;
}

</style>
</head>

<body>

<div class="bg-blur"></div>

<div id="auth" class="container">

  <div class="logo">
    <span class="k">k</span>elim
  </div>

  <button id="loginBtn" class="google-btn">
    <div class="dot"></div>
    Entrar com Google
  </button>

</div>

<div id="app">
  <h1>Logado com sucesso 🚀</h1>
  <p id="userName"></p>
  <button onclick="logout()">Sair</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script>

// 🔥 SUA CONFIG (JÁ COLOQUEI)
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.firebasestorage.app",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6",
  measurementId: "G-QE3JHTLS32"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// LOGIN GOOGLE
document.getElementById("loginBtn").onclick = async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  try {
    await auth.signInWithPopup(provider);
  } catch (e) {
    alert("Erro no login");
    console.log(e);
  }
};

// LOGOUT
function logout(){
  auth.signOut();
}

// DETECTAR LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("userName").innerText =
      "Bem-vindo, " + user.displayName;

  }else{
    document.getElementById("auth").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

</script>

</body>
</html>
