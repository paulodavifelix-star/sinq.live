<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}

/* TELAS */
.screen {
  display:none;
  height:100vh;
}

.active {
  display:block;
}

/* NAVBAR */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
}

.nav-btn {
  color:#888;
}

.nav-btn.active {
  color:#ff2d55;
}

/* HOME */
.live-card {
  padding:15px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live-info {
  font-size:14px;
}

.live-card button {
  background:#ff2d55;
  border:none;
  padding:6px 12px;
  border-radius:10px;
  color:white;
}

/* LIVE */
.video-area {
  position:relative;
  height:100%;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* TOP */
.top-bar {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left-top {
  display:flex;
  align-items:center;
  gap:8px;
}

.live-badge {
  background:red;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

.viewers {
  background:rgba(0,0,0,0.7);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* USER */
.user-info {
  position:absolute;
  bottom:120px;
  left:10px;
}

.verified {
  color:#4da6ff;
}

/* BUTTONS RIGHT */
.actions {
  position:absolute;
  right:10px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.action-btn {
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:50%;
  text-align:center;
  font-size:12px;
}

/* CHAT */
.chat-box {
  position:absolute;
  bottom:60px;
  left:10px;
  width:70%;
  max-height:150px;
  overflow:hidden;
  font-size:13px;
}

.input-area {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button {
  margin-left:5px;
}

/* EXIT */
.exit {
  position:absolute;
  top:10px;
  right:10px;
  font-size:18px;
}

/* COUNTDOWN */
.countdown {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">

  <div class="live-card">
    <div class="live-info">
      João <span class="verified">✔</span><br>
      120 assistindo
    </div>
    <button onclick="enterLive('joao')">Assistir</button>
  </div>

  <div class="live-card">
    <div class="live-info">
      Ana<br>
      80 assistindo
    </div>
    <button onclick="enterLive('ana')">Assistir</button>
  </div>

</div>

<!-- LIVE -->
<div id="live" class="screen">

  <div class="video-area">

    <iframe id="player"></iframe>

    <div class="exit" onclick="go('home')">✕</div>

    <div class="top-bar">
      <div class="left-top">
        <div class="live-badge">LIVE</div>
        <div class="viewers"><span id="viewers">15</span></div>
      </div>
    </div>

    <div class="user-info">
      <b id="username">user</b> <span class="verified">✔</span>
    </div>

    <div class="actions">
      <div class="action-btn">❤️</div>
      <div class="action-btn">+</div>
      <div class="action-btn">↗</div>
    </div>

    <div class="chat-box" id="messages"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Comentar...">
      <button onclick="sendMessage()">Enviar</button>
    </div>

    <div id="countdown" class="countdown"></div>

  </div>
</div>

<!-- CREATE -->
<div id="create" class="screen">
  <h3 style="padding:20px;">Criar Live</h3>
  <button onclick="startLive()">Iniciar</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-btn active" onclick="go('home')">Home</div>
  <div class="nav-btn" onclick="go('create')">Criar</div>
</div>

<script>
const room = "live123";

// NAV
function go(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

// ENTER LIVE
function enterLive(name) {
  go("live");
  document.getElementById("username").innerText = name;

  let count = 3;
  const el = document.getElementById("countdown");

  const timer = setInterval(() => {
    el.innerText = count;
    count--;

    if (count < 0) {
      clearInterval(timer);
      el.innerText = "";
      document.getElementById("player").src = "https://vdo.ninja/?view=" + room;
    }
  }, 1000);
}

// START LIVE
function startLive() {
  window.open("https://vdo.ninja/?push=" + room, "_blank");
  enterLive("Você");
}

// CHAT
function sendMessage() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  addMessage("Você", input.value);
  input.value = "";
}

function addMessage(user, text) {
  const msgBox = document.getElementById("messages");
  const el = document.createElement("div");
  el.innerHTML = `<b>${user}:</b> ${text}`;
  msgBox.appendChild(el);

  if (msgBox.children.length > 20) {
    msgBox.removeChild(msgBox.firstChild);
  }
}

// BOTS
const names = ["joao","ana","carlos","maria"];
const msgs = ["muito bom","kkkk","faz de novo","top demais"];

setInterval(() => {
  if (Math.random() > 0.5) {
    addMessage(
      names[Math.floor(Math.random()*names.length)],
      msgs[Math.floor(Math.random()*msgs.length)]
    );
  }
}, 2000);

// VIEWERS
let viewers = 15;

setInterval(() => {
  viewers += Math.floor(Math.random()*5) - 2;
  if (viewers < 5) viewers = 5;
  document.getElementById("viewers").innerText = viewers;
}, 3000);

</script>

</body>
</html>
