<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Plataforma</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: #1f1f1f;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  animation: fadeIn 0.6s ease;
}

button {
  background: #9146ff;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #772ce8;
  transform: scale(1.05);
}

iframe {
  border-radius: 15px;
  width: 100%;
  height: 400px;
}

.viewer-count {
  margin-top: 10px;
  font-size: 18px;
  color: #aaa;
}

.chat {
  background: #111;
  height: 200px;
  overflow-y: auto;
  border-radius: 10px;
  padding: 10px;
  text-align: left;
}

.chat p {
  margin: 5px 0;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.send-btn {
  padding: 10px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>🚀 Minha Plataforma</header>

<div class="container">

  <div class="card">
    <h2>📱 Iniciar Live</h2>
    <a href="https://vdo.ninja/?push=live123" target="_blank">
      <button>Entrar ao Vivo</button>
    </a>
  </div>

  <div class="card">
    <h2>👀 Assistir Live</h2>

    <iframe src="https://vdo.ninja/?view=live123"></iframe>

    <div class="viewer-count" id="viewers">👁 0 assistindo</div>
  </div>

  <div class="card">
    <h2>💬 Chat</h2>

    <div class="chat" id="chatBox"></div>

    <input type="text" id="msg" placeholder="Digite sua mensagem...">
    <button class="send-btn" onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
let viewers = 0;

setInterval(() => {
  viewers += Math.floor(Math.random() * 5);
  document.getElementById("viewers").innerText = "👁 " + viewers + " assistindo";
}, 3000);

function sendMessage() {
  const msgInput = document.getElementById("msg");
  const chatBox = document.getElementById("chatBox");

  if (msgInput.value.trim() === "") return;

  const p = document.createElement("p");
  p.innerText = "User" + Math.floor(Math.random()*1000) + ": " + msgInput.value;

  chatBox.appendChild(p);
  msgInput.value = "";

  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
