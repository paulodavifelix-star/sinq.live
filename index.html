<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kelim</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
}

/* LOGIN */
#authScreen {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: linear-gradient(to bottom, #000, #0f2f0f);
}

.logo {
  font-size:40px;
  font-weight:bold;
  margin-bottom:30px;
}

.google-btn {
  background:#fff;
  color:#000;
  padding:15px 25px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
#app {
  display:none;
  padding:20px;
}

.profile {
  text-align:center;
}

.profile img {
  width:80px;
  height:80px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authScreen">
  <div class="logo">kelim</div>
  <button id="loginBtn" class="google-btn">Continuar com Google</button>
</div>

<!-- APP -->
<div id="app">
  <div class="profile">
    <img id="photo">
    <h2 id="name"></h2>
    <p id="email"></p>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
// CONFIG (SEU FIREBASE)
const firebaseConfig = {
  apiKey: "AIzaSyBJgVEEcAzTgRUH2SvTi3u7VtXpYCtoNDQ",
  authDomain: "kelim-f9e46.firebaseapp.com",
  projectId: "kelim-f9e46",
  storageBucket: "kelim-f9e46.firebasestorage.app",
  messagingSenderId: "912757042147",
  appId: "1:912757042147:web:0fd5fd9e3f1952f5720ed6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  await auth.signInWithRedirect(provider);
};

// 🔥 PEGA LOGIN DO REDIRECT
auth.getRedirectResult().then((result) => {
  if (result.user) {
    console.log("Login redirect OK");
  }
}).catch(console.error);

// 🔥 ESTADO REAL DO USUÁRIO
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("name").innerText = user.displayName;
    document.getElementById("email").innerText = user.email;
    document.getElementById("photo").src = user.photoURL;

  } else {
    document.getElementById("authScreen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});
</script>

</body>
</html>
